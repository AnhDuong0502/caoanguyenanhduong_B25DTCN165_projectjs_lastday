<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f3f4f6;
}

.modal{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background: rgba(0,0,0,0.4);

    display:flex;
    justify-content:center;
    align-items:center;
}


.modal-content{
    width:420px;
    background:#fff;
    border-radius:10px;
    padding:20px;
    position:relative;
}


.modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.modal-header h3{
    font-size:16px;
}

.close{
    cursor:pointer;
    font-size:18px;
}


.form-group{
    margin-bottom:12px;
}

.form-group label{
    font-size:13px;
    display:block;
    margin-bottom:4px;
}

.form-group input,
.form-group select{
    width:100%;
    height:36px;
    border:1px solid #ddd;
    border-radius:6px;
    padding:6px 10px;
    outline:none;
}

.required{
    color:red;
}

/* footer */
.modal-footer{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:15px;
}

.btn{
    padding:6px 14px;
    border-radius:6px;
    border:none;
    cursor:pointer;
}

.btn-cancel{
    background:#f3f4f6;
}

.btn-save{
    background:#4f46e5;
    color:white;
}
</style>

</head>
<body>

<div class="modal">
    <div class="modal-content">

        
        <div class="modal-header">
            <h3>Change Information</h3>
            <span class="close">×</span>
        </div>

       
        <div class="form-group">
            <label>Name <span class="required">*</span></label>
            <input type="text" value="Nguyen Van A">
        </div>

        <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" value="nguyenvana@gmail.com">
        </div>

        <div class="form-group">
            <label>Phone <span class="required">*</span></label>
            <input type="text" value="0987654321">
        </div>

        <div class="form-group">
            <label>Gender <span class="required">*</span></label>
            <select>
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        
        <div class="modal-footer">
            <button class="btn btn-cancel">Cancel</button>
            <button class="btn btn-save">Save</button>
        </div>

    </div>
</div>

</body>
</html>
